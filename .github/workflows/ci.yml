name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (plenary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pinned to a concrete Neovim release rather than `stable` so a new
      # upstream release can't turn CI red on an unchanged tree. Bump this
      # deliberately (and re-run the suite locally) when you move it.
      # v0.12.3 is the version this config is verified against; see README.md.
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.12.3

      # `make` clones the pinned plenary into the gitignored .tests-deps/ on
      # first use (PLENARY_REF in the Makefile), so the suite is hermetic.
      - name: Run the spec suite
        run: make test

  lint:
    name: lint (luacheck + stylua)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # luacheck runs on Lua 5.1 (matches the PUC-Rio runtime used locally).
      - name: Set up Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.1"
      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      # Pinned: a luacheck release that adds a new check could fail an
      # unchanged tree. 1.2.0 is the version this config is verified clean against.
      # (.luacheckrc excludes the .lua/.luarocks trees these actions install.)
      - name: Install luacheck
        run: luarocks install luacheck 1.2.0
      - name: luacheck
        run: luacheck .

      # Pinned for the same reason: stylua's default formatting can shift
      # between releases. Keep this in sync with the version you format with
      # locally. Use `-- stylua: ignore` on any span you want to hand-format.
      - name: stylua --check
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v2.5.2
          args: --check .

  markdown:
    name: markdown (markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pinned, like the other linters. Globs/ignores live in
      # .markdownlint-cli2.yaml so this matches the local invocation exactly.
      # npx uses the runner's preinstalled Node; no extra setup needed.
      - name: markdownlint
        run: npx --yes markdownlint-cli2@0.22.1

  type-check:
    name: type-check (lua-language-server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Same pinned Neovim as the test job: `make lint-types` resolves its type
      # library ($VIMRUNTIME + the lazy plugin dir) from nvim at runtime.
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: v0.12.3

      # lua_ls reads types from the installed plugins, so CI must populate the
      # lazy dir. Cache it on lazy-lock.json so unchanged pins skip re-cloning.
      - name: Cache lazy plugins
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/lazy
          key: lazy-${{ hashFiles('lazy-lock.json') }}

      # `install` clones anything missing; `restore` checks out the
      # lazy-lock.json pins, so the type set is reproducible and matches the
      # local tree. `!` makes each block until done (no UI to wait on).
      - name: Install plugins
        run: |
          nvim --headless "+Lazy! install" +qa
          nvim --headless "+Lazy! restore" +qa

      # Pinned like the other tools: lua_ls diagnostics shift between releases,
      # so a new version could turn an unchanged tree red. 3.18.2 is the version
      # this tree is verified clean against; keep it in sync with the lua_ls you
      # run locally and re-run `make lint-types` when you bump it.
      - name: Install lua-language-server
        run: |
          VER=3.18.2
          mkdir -p "$HOME/luals"
          curl -sfL "https://github.com/LuaLS/lua-language-server/releases/download/${VER}/lua-language-server-${VER}-linux-x64.tar.gz" \
            | tar xz -C "$HOME/luals"
          echo "$HOME/luals/bin" >> "$GITHUB_PATH"

      - name: make lint-types
        run: make lint-types
